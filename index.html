<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>~/vzanonato — portfolio</title>
  <link rel="icon" type="image/png" href="images/icone.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Inter+Tight:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Defaults (overridden by tweaks via JS) */
      --bg:        #0a0a0c;
      --surface:   #111114;
      --surface-2: #16161a;
      --border:    #24242a;
      --border-2:  #34343c;
      --text:      #e8e8ec;
      --text-dim:  #8a8a94;
      --text-faint:#4c4c54;
      --accent:    #c77dff;
      --accent-2:  #ff7dd8;
      --accent-glow:rgba(199,125,255,0.14);
      --ok:        #4ade80;
      --warn:      #fbbf24;
      --info:      #60a5fa;
      --danger:    #ff5577;

      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --font-sans: 'Inter Tight', system-ui, sans-serif;

      --pad-x: clamp(1.25rem, 4vw, 3rem);
      --gap-s: 1rem;
      --gap-m: 2rem;
      --gap-l: 4rem;
      --gap-xl: 6rem;
      --row-pad: 1.25rem;
    }

    /* Density variants */
    [data-density="compact"] { --gap-s:.6rem; --gap-m:1.25rem; --gap-l:2.5rem; --gap-xl:3.75rem; --row-pad:.85rem; }
    [data-density="comfy"]   { --gap-s:1.25rem; --gap-m:2.5rem; --gap-l:5rem; --gap-xl:8rem; --row-pad:1.5rem; }

    /* Reset */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      overflow-x: hidden;
    }
    ::selection { background: var(--accent); color: var(--bg); }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; }
    img { display: block; max-width: 100%; }

    /* Background dot grid — very faint */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 80%);
      opacity: .5;
      pointer-events: none;
      z-index: 0;
    }
    body[data-grid="off"]::before { display: none; }

    /* Optional scanline */
    body[data-scanline="on"]::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(180deg, transparent 0, transparent 2px, rgba(255,255,255,.012) 2px, rgba(255,255,255,.012) 3px);
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: overlay;
    }

    /* Layout */
    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 var(--pad-x);
      position: relative;
      z-index: 1;
    }

    /* Topbar — terminal title strip */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,10,12,.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem;
      padding: .75rem 0;
      font-size: 12px;
    }
    .top-left { display: flex; align-items: center; gap: .9rem; min-width: 0; flex: 1; }
    .top-dots { display: flex; gap: 6px; flex-shrink: 0; }
    .top-dots span { width: 10px; height: 10px; border-radius: 50%; background: var(--border-2); }
    .top-dots span:nth-child(1){ background:#ff5f57; }
    .top-dots span:nth-child(2){ background:#febc2e; }
    .top-dots span:nth-child(3){ background:#28c840; }
    .top-prompt { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .top-prompt b { color: var(--accent); font-weight: 500; }
    .top-prompt .path { color: var(--info); }
    .top-right { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    .lang-toggle {
      display: inline-flex; align-items: stretch;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      font-size: 11px;
    }
    .lang-toggle button {
      background: transparent;
      border: 0;
      color: var(--text-dim);
      padding: .35rem .65rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      transition: all .15s;
    }
    .lang-toggle button.active {
      background: var(--accent);
      color: var(--bg);
    }
    .lang-toggle button:hover:not(.active) { color: var(--text); background: var(--surface); }
    .status-pill {
      display: inline-flex; align-items: center; gap: .5rem;
      color: var(--text-dim);
      font-size: 11px;
    }
    .status-pill .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 0 var(--ok);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,.6); }
      50% { box-shadow: 0 0 0 6px rgba(74,222,128,0); }
    }
    .clock { color: var(--text-faint); font-size: 11px; }

    /* Section base */
    section.section {
      padding: var(--gap-xl) 0 var(--gap-l);
      position: relative;
      z-index: 1;
    }
    section.section + section.section { padding-top: 0; }
    .sec-head {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      align-items: baseline;
      gap: 1rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px dashed var(--border);
      margin-bottom: var(--gap-m);
    }
    .sec-num {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: .1em;
      font-weight: 500;
    }
    .sec-title {
      font-size: clamp(1.25rem, 2.2vw, 1.6rem);
      font-weight: 500;
      letter-spacing: -.01em;
      color: var(--text);
    }
    .sec-cmd { color: var(--text-faint); font-size: 12px; }

    /* Hero */
    .hero { padding: clamp(3rem, 8vh, 6rem) 0 var(--gap-l); }
    .hero-cmd { color: var(--text-dim); font-size: 13px; margin-bottom: 1.5rem; }
    .hero-cmd .pmt { color: var(--accent); margin-right: .5rem; }
    .hero-cmd .out { color: var(--text-faint); }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 3rem;
      align-items: start;
    }
    @media (max-width: 820px) { .hero-grid { grid-template-columns: 1fr; } }

    .hero-name {
      font-family: var(--font-mono);
      font-size: clamp(2.2rem, 6.5vw, 4.4rem);
      line-height: .98;
      letter-spacing: -.04em;
      font-weight: 500;
      margin: 0 0 1.25rem;
    }
    .hero-name .last { color: var(--accent); }
    .hero-name .cursor {
      display: inline-block;
      width: .5em; height: .9em;
      background: var(--accent);
      margin-left: 4px;
      vertical-align: -.05em;
      animation: blink 1.05s steps(2) infinite;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    .hero-role {
      color: var(--text-dim);
      font-size: clamp(.85rem, 1.3vw, 1rem);
      letter-spacing: .02em;
      margin-bottom: 2rem;
    }
    .hero-role .sep { color: var(--text-faint); margin: 0 .55rem; }
    .hero-intro {
      max-width: 58ch;
      color: var(--text);
      line-height: 1.7;
      font-size: 14px;
      margin: 0 0 2rem;
    }
    .hero-meta {
      display: flex; flex-wrap: wrap; gap: 1rem 1.75rem;
      color: var(--text-dim);
      font-size: 12px;
      margin-bottom: 2.25rem;
    }
    .hero-meta span { display: inline-flex; align-items: center; gap: .5rem; }
    .hero-meta .lbl { color: var(--text-faint); }

    .cta-row { display: flex; flex-wrap: wrap; gap: .75rem; }
    .btn {
      display: inline-flex; align-items: center; gap: .55rem;
      padding: .7rem 1rem;
      font-family: var(--font-mono);
      font-size: 12px;
      border-radius: 3px;
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--text);
      transition: all .15s;
      letter-spacing: .01em;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
    .btn.primary { background: var(--accent); color: #0a0a0c; border-color: var(--accent); font-weight: 600; }
    .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); color: #0a0a0c; }
    .btn .arr { color: var(--text-faint); transition: transform .15s; }
    .btn:hover .arr { transform: translateX(2px); color: inherit; }

    /* Hero photo / portrait frame */
    .portrait {
      position: relative;
      width: 220px; height: 280px;
      border: 1px solid var(--border-2);
      padding: 8px;
      background:
        linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
    }
    .portrait::before, .portrait::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border: 1px solid var(--accent);
    }
    .portrait::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
    .portrait::after { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }
    .portrait-img {
      width: 100%; height: 100%;
      background: var(--surface-2);
      filter: grayscale(.2) contrast(1.05);
      object-fit: cover;
    }
    .portrait-tag {
      position: absolute; bottom: -1px; left: 50%;
      transform: translate(-50%, 50%);
      background: var(--bg);
      padding: 0 .5rem;
      color: var(--text-faint);
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    /* About — info grid */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap-m);
    }
    @media (max-width: 820px) { .about-grid { grid-template-columns: 1fr; } }

    .panel {
      border: 1px solid var(--border);
      background: var(--surface);
      padding: var(--row-pad) 1.25rem;
    }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      color: var(--text-faint);
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      padding-bottom: .85rem;
      margin-bottom: 1rem;
      border-bottom: 1px dashed var(--border);
    }
    .panel-head .file { color: var(--text-dim); }
    .panel-head .pill {
      padding: 2px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-faint);
      letter-spacing: .15em;
    }

    .kv-list { display: grid; grid-template-columns: max-content 1fr; gap: .5rem 1.25rem; font-size: 13px; align-items: baseline; }
    .kv-list dt { color: var(--text-faint); letter-spacing: .02em; }
    .kv-list dd { margin: 0; color: var(--text); word-break: break-word; }
    .kv-list dd a:hover { color: var(--accent); }

    .bio { color: var(--text); line-height: 1.75; font-size: 13px; }
    .bio + .bio { margin-top: 1rem; }

    /* Stack chips */
    .chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: 1rem; }
    .chip {
      padding: .35rem .65rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: .02em;
    }
    .chip:hover { color: var(--accent); border-color: var(--accent); }

    /* Stat row */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-top: 1rem;
    }
    @media (max-width: 640px) { .stat-row { grid-template-columns: repeat(2, 1fr); } }
    .stat {
      background: var(--surface);
      padding: 1rem 1rem;
    }
    .stat .v { font-size: 1.5rem; color: var(--accent); font-weight: 500; letter-spacing: -.02em; }
    .stat .l { font-size: 10px; color: var(--text-faint); letter-spacing: .12em; text-transform: uppercase; margin-top: .25rem; }

    /* Experience — git log style */
    .log {
      display: grid;
      gap: 0;
    }
    .commit {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 1.5rem;
      padding: 1.25rem 0;
      border-top: 1px dashed var(--border);
    }
    .commit:first-child { border-top: 0; }
    @media (max-width: 720px) { .commit { grid-template-columns: 1fr; gap: .5rem; } }

    .commit-meta { font-size: 11px; color: var(--text-faint); letter-spacing: .04em; }
    .commit-meta .hash { color: var(--warn); display: block; margin-bottom: .25rem; font-family: var(--font-mono); }
    .commit-meta .date { color: var(--text-dim); display: block; }
    .commit-meta .loc { color: var(--text-faint); display: block; margin-top: .15rem; }

    .commit-body .role-line {
      display: flex; align-items: baseline; gap: .75rem; flex-wrap: wrap;
      margin-bottom: .35rem;
    }
    .commit-body .role { color: var(--accent); font-weight: 500; font-size: 13px; }
    .commit-body .at { color: var(--text-faint); }
    .commit-body .co { color: var(--text); font-size: 14px; font-weight: 500; }
    .commit-body .tag-row { display: flex; flex-wrap: wrap; gap: .35rem; margin: .5rem 0 .65rem; }
    .commit-body .desc { color: var(--text-dim); font-size: 13px; line-height: 1.65; max-width: 70ch; }
    .badge {
      font-size: 10px;
      padding: 2px 7px;
      border: 1px solid var(--border-2);
      color: var(--text-dim);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .badge.current { color: var(--ok); border-color: var(--ok); }
    .badge.past { color: var(--text-faint); }
    .badge.modality-home-office { color: var(--accent); border-color: var(--accent); }
    .badge.modality-presencial, .badge.modality-on-site { color: var(--info); border-color: var(--info); }
    .badge.modality-semi-presencial { color: var(--warn); border-color: var(--warn); }

    /* Education */
    .edu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap-m);
    }
    @media (max-width: 720px) { .edu-grid { grid-template-columns: 1fr; } }
    .edu {
      border: 1px solid var(--border);
      background: var(--surface);
      transition: border-color .2s;
    }
    .edu:hover { border-color: var(--accent); }
    .edu-thumb {
      height: 90px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .edu-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .edu-body { padding: 1.1rem 1.25rem; }
    .edu-body h4 { margin: 0 0 .25rem; font-size: 14px; font-weight: 500; color: var(--text); }
    .edu-body .deg { color: var(--text-dim); font-size: 12px; margin-bottom: .6rem; }
    .edu-body .when { color: var(--text-faint); font-size: 11px; display: flex; align-items: center; gap: .5rem; }
    .edu-body .when::before { content: '↳'; color: var(--accent); }
    .edu-body .note {
      margin-top: .75rem;
      padding: .5rem .65rem;
      background: var(--bg);
      border-left: 2px solid var(--accent);
      color: var(--text-dim);
      font-size: 11px;
    }

    /* Projects */
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: var(--gap-s);
    }
    .proj {
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex; flex-direction: column;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .proj:hover { border-color: var(--accent); transform: translateY(-2px); }
    .proj-head {
      padding: .65rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: .04em;
    }
    .proj-head .path { color: var(--text-dim); }
    .proj-head .status { color: var(--ok); }
    .proj-head .status.wip { color: var(--warn); }
    .proj-thumb {
      aspect-ratio: 16/9;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .proj-thumb img {
      width: 100%; height: 100%; object-fit: cover;
      opacity: .85;
      filter: contrast(1.05);
    }
    .proj-thumb::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(10,10,12,.7) 100%);
    }
    .proj-thumb .logo-name {
      position: absolute;
      bottom: .65rem; left: .8rem;
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -.01em;
      z-index: 1;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }
    .proj-body { padding: 1rem 1.1rem; flex: 1; display: flex; flex-direction: column; }
    .proj-body p { color: var(--text-dim); font-size: 12px; line-height: 1.65; margin: 0 0 1rem; flex: 1; }
    .proj-body .tags { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .85rem; }
    .proj-body .link {
      display: inline-flex; align-items: center; gap: .4rem;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .proj-body .link:hover { color: var(--accent-2); }
    .proj-body .link .arr { transition: transform .15s; }
    .proj-body .link:hover .arr { transform: translateX(3px); }

    .more-link {
      display: inline-flex; align-items: center; gap: .5rem;
      margin-top: var(--gap-m);
      color: var(--text-dim);
      font-size: 12px;
      padding: .65rem .9rem;
      border: 1px solid var(--border);
      transition: all .15s;
    }
    .more-link:hover { color: var(--accent); border-color: var(--accent); }

    /* Courses — list */
    .courses {
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .course {
      display: grid;
      grid-template-columns: 60px 1.4fr 1fr 1fr 100px;
      gap: 1rem;
      padding: .85rem 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 12px;
      align-items: center;
      transition: background .15s;
    }
    .course:first-child { border-top: 0; }
    .course:hover { background: var(--surface-2); }
    .course .idx { color: var(--text-faint); font-size: 10px; letter-spacing: .1em; }
    .course .name { color: var(--text); font-weight: 500; }
    .course .org { color: var(--text-dim); }
    .course .topic { color: var(--text-faint); }
    .course .cat {
      color: var(--accent);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-align: right;
    }
    @media (max-width: 820px) {
      .course { grid-template-columns: 1fr; gap: .25rem; padding: 1rem 1.25rem; }
      .course .idx { font-size: 9px; }
      .course .cat { text-align: left; }
    }

    /* Contact */
    .contact {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: var(--gap-m);
    }
    @media (max-width: 820px) { .contact { grid-template-columns: 1fr; } }
    .contact .panel { padding: 1.5rem 1.5rem; }
    .form-row { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
    .form-row label { color: var(--text-faint); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; }
    .form-row input, .form-row textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .7rem .85rem;
      font: inherit;
      font-size: 13px;
      transition: border-color .15s;
      width: 100%;
      font-family: var(--font-mono);
    }
    .form-row input:focus, .form-row textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-row textarea { resize: vertical; min-height: 110px; }
    .form-btn {
      width: 100%;
      background: var(--accent);
      color: #0a0a0c;
      border: 0;
      padding: .85rem 1rem;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: .04em;
      font-weight: 600;
      transition: background .15s;
    }
    .form-btn:hover { background: var(--accent-2); }

    .contact-info dt { color: var(--text-faint); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; }
    .contact-info dd { color: var(--text); font-size: 13px; margin: .25rem 0 1rem; }
    .contact-info a:hover { color: var(--accent); }
    .contact-info dd .ext { color: var(--text-faint); font-size: 11px; margin-left: .35rem; }

    /* Footer */
    footer.foot {
      border-top: 1px solid var(--border);
      padding: 2.5rem 0;
      margin-top: var(--gap-l);
      color: var(--text-faint);
      font-size: 11px;
      text-align: center;
      position: relative; z-index: 1;
    }
    footer.foot .ascii {
      color: var(--text-faint);
      font-size: 9px;
      line-height: 1.1;
      margin: 0 0 1rem;
      letter-spacing: .05em;
      white-space: pre;
      overflow: hidden;
    }
    footer.foot a:hover { color: var(--accent); }

    /* Variant: light terminal palette */
    [data-palette="paper"] {
      --bg:        #f6f4ee;
      --surface:   #efece4;
      --surface-2: #e6e3d9;
      --border:    #d4d0c2;
      --border-2:  #b9b4a3;
      --text:      #1a1a1c;
      --text-dim:  #555048;
      --text-faint:#8a8276;
      --accent:    #7a3aff;
      --accent-2:  #b54aff;
    }
    [data-palette="paper"] body::before { mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 80%); opacity: .4; }
    [data-palette="paper"] .top-dots span:nth-child(1){ background:#ff5f57; }
    [data-palette="paper"] .top-dots span:nth-child(2){ background:#febc2e; }
    [data-palette="paper"] .top-dots span:nth-child(3){ background:#28c840; }

    /* Variant: green terminal */
    [data-palette="green"] {
      --accent:    #4ade80;
      --accent-2:  #86efac;
    }
    /* Variant: amber */
    [data-palette="amber"] {
      --accent:    #fbbf24;
      --accent-2:  #fde68a;
    }
    /* Variant: blue */
    [data-palette="blue"] {
      --accent:    #60a5fa;
      --accent-2:  #93c5fd;
    }
    /* Variant: monochrome */
    [data-palette="mono"] {
      --accent:    #e8e8ec;
      --accent-2:  #ffffff;
    }

    /* Font variants */
    [data-font="ibm"]   { --font-mono: 'IBM Plex Mono', ui-monospace, monospace; }
    [data-font="space"] { --font-mono: 'Space Mono', ui-monospace, monospace; }
    [data-font="mixed"] { --font-mono: 'Inter Tight', system-ui, sans-serif; }
    [data-font="serif"] { --font-mono: 'Fraunces', Georgia, serif; }
    [data-font="serif"] .hero-name { letter-spacing: -.03em; font-weight: 400; }
    [data-font="serif"] .top-prompt, [data-font="serif"] .clock, [data-font="serif"] .badge { font-family: 'JetBrains Mono', monospace; }
    [data-font="mixed"] .top-prompt, [data-font="mixed"] .clock, [data-font="mixed"] .badge, [data-font="mixed"] .commit-meta { font-family: 'JetBrains Mono', monospace; }

    /* Small responsive tweaks */
    @media (max-width: 640px) {
      .sec-head { grid-template-columns: auto 1fr; }
      .sec-cmd { display: none; }
      .top-prompt { font-size: 10px; }
      .clock { display: none; }
    }

    /* Intro overlay */
    .intro-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .6s ease;
    }
    .intro-overlay.fading { opacity: 0; pointer-events: none; }
    .intro-window {
      width: min(680px, 92vw);
      border: 1px solid var(--border-2);
      background: var(--surface);
    }
    .intro-bar {
      display: flex; align-items: center; gap: .75rem;
      padding: .55rem 1rem;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
    }
    .intro-body {
      padding: 1.25rem 1.5rem;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.75;
      min-height: 260px;
      max-height: 400px;
      overflow-y: auto;
    }
    .intro-body::-webkit-scrollbar { width: 4px; }
    .intro-body::-webkit-scrollbar-thumb { background: var(--border-2); }
    .intro-line { white-space: pre; display: block; }
    .intro-progressbar {
      padding: .5rem 1.5rem;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 13px;
      white-space: pre;
    }
    .intro-skip {
      padding: .4rem 1rem;
      border-top: 1px dashed var(--border);
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: .1em;
      text-align: right;
    }
    .i-cursor {
      display: inline-block;
      width: 7px; height: 13px;
      background: var(--accent);
      vertical-align: -.15em;
      margin-left: 1px;
      animation: blink 1.05s steps(2) infinite;
    }
    /* Portfolio wrapper — fades in after intro */
    .portfolio-wrap {
      opacity: 0;
      transition: opacity .4s ease;
    }
    .portfolio-wrap.visible { opacity: 1; }

    /* ── Cert Modal ── */
    .cert-overlay {
      position: fixed; inset: 0;
      background: rgba(10,10,12,.9);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; transition: opacity .25s ease;
      pointer-events: none;
    }
    .cert-overlay.open { opacity: 1; pointer-events: all; }
    .cert-window {
      width: min(820px, 96vw);
      border: 1px solid var(--border-2);
      background: var(--surface);
      display: flex; flex-direction: column;
      max-height: 90vh;
    }
    .cert-bar {
      display: flex; align-items: center; gap: .75rem;
      padding: .55rem 1rem;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .cert-close {
      background: transparent; border: 0;
      color: var(--text-faint); font-size: 14px;
      padding: 0 .25rem; line-height: 1; cursor: pointer;
    }
    .cert-close:hover { color: var(--danger); }
    .cert-terminal {
      padding: .9rem 1.25rem .65rem;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.7;
      flex-shrink: 0;
      border-bottom: 1px dashed var(--border);
    }
    .cert-img-wrap {
      overflow-y: auto; padding: .75rem;
      opacity: 0; transition: opacity .35s ease; flex: 1;
    }
    .cert-img-wrap.loaded { opacity: 1; }
    .cert-img { width: 100%; display: block; border: 1px solid var(--border); }

    /* Courses — cert rows */
    .course.has-cert { cursor: pointer; }
    .course.has-cert:hover {
      background: var(--surface-2);
      border-left: 2px solid var(--accent);
      padding-left: calc(1.25rem - 2px);
    }
    .cert-badge { color: var(--accent); font-size: 10px; letter-spacing: .1em; }

    /* ── Mobile responsive ── */
    @media (max-width: 820px) {
      .hero-grid { grid-template-columns: 1fr; }
      .portrait { width: 180px; height: 230px; margin: 2rem auto 0; }
      .about-grid { grid-template-columns: 1fr; }
      .edu-grid { grid-template-columns: 1fr; }
      .contact { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .top-right { gap: .5rem; }
      .status-pill span:not(.dot) { display: none; }
      .hero-name { font-size: clamp(1.8rem, 10vw, 2.8rem); }
      .hero-intro { font-size: 13px; }
      .hero-meta { gap: .5rem 1rem; font-size: 11px; }
      .cta-row { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
      .portrait { width: 150px; height: 200px; }
      .stat-row { grid-template-columns: repeat(2, 1fr); }
      .proj-grid { grid-template-columns: 1fr; }
      .course {
        grid-template-columns: 28px 1fr auto;
        grid-template-rows: auto auto;
        gap: .2rem .6rem;
        padding: .85rem 1rem;
      }
      .course .org { grid-column: 2; font-size: 11px; color: var(--text-faint); }
      .course .topic { display: none; }
      .course .cat { grid-column: 3; grid-row: 1; align-self: start; }
      .form-row input, .form-row textarea { font-size: 16px; }
      .cert-window { max-height: 95vh; }
      .cert-terminal { font-size: 11px; padding: .7rem 1rem .5rem; }
    }
    @media (max-width: 480px) {
      :root { --pad-x: 1rem; }
      .hero { padding: 2rem 0 var(--gap-m); }
      .panel { padding: 1rem; }
      .proj-body { padding: .85rem 1rem; }
      .edu-body { padding: .9rem 1rem; }
      .contact .panel { padding: 1.1rem 1rem; }
    }
  </style>
</head>
<body data-density="regular" data-palette="magenta" data-font="jetbrains" data-grid="on" data-scanline="off">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx?v=2"></script>
  <script type="text/babel" src="data.jsx?v=5"></script>
  <script type="text/babel" src="app.jsx?v=2"></script>
</body>
</html>
